<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  <meta name="theme-color" content="#ffffff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо! Заявка принята | КэпСтрой</title>
  <meta name="description" content="Ваша заявка принята. Мы перезвоним вам в течение 15 минут.">
  <meta name="robots" content="noindex, follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    p {
      font-size: 16px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .phone-box {
      background: #f8fafc;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .phone-box-label {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .phone-box-number {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      text-decoration: none;
      display: inline-block;
    }
    .phone-box-number:hover {
      color: #15803d;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #15803d, #166534);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(21, 128, 61, 0.4);
    }
    .btn-secondary {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      color: #64748b;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-secondary:hover {
      color: #15803d;
    }
    .timer {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fef3c7;
      color: #92400e;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
  
  <!-- Yandex.Metrika Goal -->
  <script type="text/javascript">
    if (typeof ym !== 'undefined') {
      ym(99999999, 'reachGoal', 'form_submit');
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    
    <h1>Заявка принята!</h1>
    <p>Андрей перезвонит вам в ближайшее время, уточнит детали и рассчитает предварительную стоимость.</p>
    
    <div class="timer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
      Обычно перезваниваем за 15 минут
    </div>
    
    <div class="phone-box">
      <div class="phone-box-label">Если срочно — звоните прямо сейчас</div>
      <a href="tel:+79780000000" class="phone-box-number">+7 (978) 000-00-00</a>
    </div>
    
    <a href="/" class="btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Вернуться на главную
    </a>
    <br>
    <a href="/uslugi/septiki/" class="btn-secondary">Подробнее про септики →</a>
  </div>
</body>
</html>
