name: Deploy kepstroy.ru

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORMS_IMAGE_NAME: ${{ github.repository }}-forms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (site)
        id: meta-site
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push site image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-site.outputs.tags }}
          labels: ${{ steps.meta-site.outputs.labels }}

      - name: Extract metadata (forms)
        id: meta-forms
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FORMS_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push forms image
        uses: docker/build-push-action@v5
        with:
          context: ./form-handler
          push: true
          tags: ${{ steps.meta-forms.outputs.tags }}
          labels: ${{ steps.meta-forms.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/kepstroy-site || mkdir -p /opt/kepstroy-site
            cd /opt/kepstroy-site

            # Always update docker-compose.yml to latest version
            curl -sL https://raw.githubusercontent.com/vlasdobry/kepstroy-site/main/docker-compose.yml -o docker-compose.yml

            sudo docker compose pull
            sudo docker compose up -d --force-recreate
            sudo docker image prune -f
