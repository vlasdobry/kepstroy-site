name: Deploy kepstroy.ru

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-site:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push site image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-forms:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-forms
          tags: |
            type=raw,value=latest

      - name: Build and push forms image
        uses: docker/build-push-action@v5
        with:
          context: ./form-handler
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [build-site, build-forms]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PROXY_URL: ${{ secrets.TELEGRAM_PROXY_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          envs: BOT_TOKEN,CHAT_ID,TELEGRAM_PROXY_URL
          script: |
            set -euxo pipefail
            cd /opt/kepstroy-site || mkdir -p /opt/kepstroy-site
            cd /opt/kepstroy-site

            # Download only compose file; images are pre-built in GHCR
            curl -fsSL https://raw.githubusercontent.com/vlasdobry/kepstroy-site/main/docker-compose.yml -o docker-compose.yml

            # Write environment variables for docker compose
            cat > .env <<EOF
            BOT_TOKEN=${BOT_TOKEN}
            CHAT_ID=${CHAT_ID}
            TELEGRAM_PROXY_URL=${TELEGRAM_PROXY_URL}
            EOF

            sudo docker compose pull
            sudo -E docker compose --env-file .env up -d --force-recreate
            sleep 5
            echo "Removing Telegram webhook (using polling instead)..."
            curl -s --max-time 15 -x "$TELEGRAM_PROXY_URL" "https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook" || echo "deleteWebhook failed"
            sudo docker compose logs --tail=20
            echo "Testing form submission..."
            HTTP_CODE=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" -X POST "https://kepstroy.ru/submit" -d "name=CI+Test&phone=+79999999999&service=septiki&page=https://kepstroy.ru/&message=CI+test")
            echo "Form submission HTTP code: $HTTP_CODE"
            if [ "$HTTP_CODE" != "302" ]; then
              sudo docker compose logs --tail=50
              exit 1
            fi
            sudo docker image prune -f
